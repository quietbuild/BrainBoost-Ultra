<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainBoost Explorer</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:#fff;
  min-height:100vh;
  background: linear-gradient(-45deg,#ff0066,#6a00ff,#00c3ff,#00ff88,#ffcc00);
  background-size:400% 400%;
  animation: gradientShift 15s ease infinite;
}

@keyframes gradientShift{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

header{
  text-align:center;
  padding:60px 20px 30px;
}

header h1{
  font-size:40px;
  margin:0;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.search-box{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(15px);
  padding:20px;
  border-radius:20px;
}

input{
  flex:1;
  padding:14px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

button{
  padding:14px 20px;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

.card{
  margin-top:30px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(15px);
  padding:25px;
  border-radius:20px;
}

#image img{
  width:100%;
  border-radius:15px;
  margin:15px 0;
}

#overview{
  line-height:1.6;
}

.hidden{
  display:none;
}

</style>
</head>

<body>

<header>
  <h1>BrainBoost Explorer</h1>
  <p>Built by Vrishab Varun</p>
</header>

<div class="container">

  <div class="search-box">
    <input id="topicInput" placeholder="Search anything...">
    <button onclick="searchTopic()">Search</button>
    <button onclick="randomTopic()">Random</button>
  </div>

  <div id="results" class="card hidden">
    <h2 id="title"></h2>
    <div id="image"></div>
    <div id="overview"></div>
    <button id="toggleBtn" onclick="toggleText()" class="hidden">Show More</button>
    <button onclick="copyText()">Copy Summary</button>
  </div>

</div>

<script>

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

document.getElementById("topicInput").addEventListener("keydown", function(e){
  if(e.key==="Enter"){ searchTopic(); }
});

let fullText="";
let collapsed=true;

async function searchTopic(topicOverride=null){

  const inputField=document.getElementById("topicInput");
  const input=topicOverride || inputField.value.trim();
  if(!input) return;

  document.getElementById("results").classList.remove("hidden");
  document.getElementById("title").innerText="Searching...";
  document.getElementById("overview").innerText="";
  document.getElementById("image").innerHTML="";
  document.getElementById("toggleBtn").classList.add("hidden");

  try{

    // Search best match
    const searchRes=await fetch(
      `https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&list=search&srsearch=${encodeURIComponent(input)}&srlimit=1`
    );
    const searchData=await searchRes.json();

    if(!searchData.query.search.length){
      document.getElementById("title").innerText="No Results Found";
      return;
    }

    const bestMatch=searchData.query.search[0].title;

    // Get full text
    const pageRes=await fetch(
      `https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&prop=extracts&explaintext=true&titles=${encodeURIComponent(bestMatch)}`
    );
    const pageData=await pageRes.json();
    const page=Object.values(pageData.query.pages)[0];
    fullText=page.extract;

    // Get image
    const summaryRes=await fetch(
      `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(bestMatch)}`
    );
    const summaryData=await summaryRes.json();

    document.getElementById("title").innerText=bestMatch;

    if(summaryData.thumbnail){
      document.getElementById("image").innerHTML=
        `<img src="${summaryData.thumbnail.source}">`;
    }

    if(fullText.length>800){
      document.getElementById("overview").innerText=fullText.substring(0,800)+"...";
      document.getElementById("toggleBtn").classList.remove("hidden");
      collapsed=true;
    }else{
      document.getElementById("overview").innerText=fullText;
    }

  }catch(error){
    document.getElementById("title").innerText="Connection Error";
  }
}

function toggleText(){
  if(collapsed){
    document.getElementById("overview").innerText=fullText;
    document.getElementById("toggleBtn").innerText="Show Less";
    collapsed=false;
  }else{
    document.getElementById("overview").innerText=fullText.substring(0,800)+"...";
    document.getElementById("toggleBtn").innerText="Show More";
    collapsed=true;
  }
}

function copyText(){
  navigator.clipboard.writeText(fullText);
  alert("Copied to clipboard");
}

function randomTopic(){
  fetch("https://en.wikipedia.org/api/rest_v1/page/random/summary")
    .then(res=>res.json())
    .then(data=>searchTopic(data.title));
}

</script>

</body>
</html>
