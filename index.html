<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainBoost X</title>

<style>

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:#fff;
  background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1a1a2e);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
  min-height:100vh;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

header{
  text-align:center;
  padding:70px 20px 40px;
}

header h1{
  font-size:44px;
  margin:0;
  letter-spacing:1px;
  text-shadow:0 0 25px rgba(255,255,255,0.35);
}

header p{
  opacity:0.8;
  margin-top:12px;
  font-size:18px;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.search-box{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  backdrop-filter:blur(18px);
  background:rgba(255,255,255,0.08);
  padding:22px;
  border-radius:22px;
  box-shadow:0 25px 70px rgba(0,0,0,0.6);
}

input{
  flex:1;
  min-width:200px;
  padding:15px;
  border-radius:14px;
  border:none;
  font-size:16px;
  background:rgba(0,0,0,0.45);
  color:white;
}

input:focus{
  outline:none;
  box-shadow:0 0 15px rgba(31,111,235,0.6);
}

button{
  padding:15px 22px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#1f6feb,#3a8bfd);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(31,111,235,0.6);
}

.card{
  margin-top:40px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(18px);
  padding:30px;
  border-radius:24px;
  box-shadow:0 25px 70px rgba(0,0,0,0.6);
}

#image img{
  width:100%;
  border-radius:18px;
  margin:20px 0;
}

.suggestions button{
  margin:6px 6px 0 0;
  background:rgba(0,0,0,0.45);
}

footer{
  text-align:center;
  padding:70px 20px;
  opacity:0.7;
  font-size:14px;
}

</style>
</head>

<body>

<header>
  <h1>BrainBoost X</h1>
  <p>Private Intelligence Engine</p>
</header>

<div class="container">

  <div class="search-box">
    <input id="topicInput" placeholder="Search anything...">
    <button onclick="searchTopic()">Explore</button>
    <button onclick="randomTopic()">Random</button>
  </div>

  <div id="results" class="card" style="display:none;">
    <h2 id="title"></h2>
    <div id="image"></div>
    <p id="overview"></p>

    <h3>Related Topics</h3>
    <div id="related" class="suggestions"></div>
  </div>

</div>

<footer>
BrainBoost X<br>
Engineered by Vrishab Varun<br>
© 2026 All Rights Reserved
</footer>

<script>

document.getElementById("topicInput").addEventListener("keydown", function(e){
  if(e.key==="Enter"){
    searchTopic();
  }
});

async function searchTopic(topicOverride=null){

  const inputField=document.getElementById("topicInput");
  const input=topicOverride || inputField.value.trim();
  if(!input) return;

  document.getElementById("results").style.display="block";
  document.getElementById("title").innerText="Searching...";
  document.getElementById("overview").innerText="";
  document.getElementById("image").innerHTML="";
  document.getElementById("related").innerHTML="";

  try{

    const searchRes=await fetch(
      `https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&list=search&srsearch=${encodeURIComponent(input)}&srlimit=5&srinfo=suggestion`
    );

    const searchData=await searchRes.json();

    if(searchData.query.searchinfo && searchData.query.searchinfo.suggestion){
      return searchTopic(searchData.query.searchinfo.suggestion);
    }

    if(!searchData.query.search.length){
      document.getElementById("title").innerText="No Results Found";
      document.getElementById("overview").innerText="Try another spelling.";
      return;
    }

    const bestMatch=searchData.query.search[0].title;

    const summaryRes=await fetch(
      `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(bestMatch)}`
    );

    const summaryData=await summaryRes.json();

    document.getElementById("title").innerText=summaryData.title;
    document.getElementById("overview").innerText=summaryData.extract;

    if(summaryData.thumbnail){
      document.getElementById("image").innerHTML=
        `<img src="${summaryData.thumbnail.source}" alt="${summaryData.title}">`;
    }

    searchData.query.search.slice(1,6).forEach(item=>{
      const btn=document.createElement("button");
      btn.innerText=item.title;
      btn.onclick=()=>searchTopic(item.title);
      document.getElementById("related").appendChild(btn);
    });

  }catch(error){
    document.getElementById("title").innerText="Connection Error";
    document.getElementById("overview").innerText="Check internet connection.";
  }
}

function randomTopic(){
  fetch("https://en.wikipedia.org/api/rest_v1/page/random/summary")
    .then(res=>res.json())
    .then(data=>{
      searchTopic(data.title);
    });
}

</script>

</body>
</html>
