<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainBoost Pro</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:#fff;
  min-height:100vh;
  background: linear-gradient(-45deg,#ff0066,#6a00ff,#00c3ff,#00ff88,#ffcc00);
  background-size:400% 400%;
  animation: gradientShift 15s ease infinite;
}
@keyframes gradientShift{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}
header{text-align:center;padding:60px 20px 30px;}
.container{max-width:900px;margin:auto;padding:20px;}
.search-box{
  display:flex;gap:10px;flex-wrap:wrap;
  background:rgba(0,0,0,0.6);
  padding:20px;border-radius:20px;
}
input{
  flex:1;padding:14px;border-radius:10px;border:none;font-size:16px;
}
button{
  padding:12px 18px;border:none;border-radius:10px;font-weight:600;cursor:pointer;
}
.card{
  margin-top:30px;background:rgba(0,0,0,0.7);
  padding:25px;border-radius:20px;
}
.section-title{
  margin-top:25px;
  font-weight:bold;
  font-size:18px;
}
ul{line-height:1.6;}
.hidden{display:none;}
.quiz-question{
  margin-bottom:10px;
  cursor:pointer;
}
.answer{
  color:#00ffcc;
  display:none;
  margin-top:4px;
}
.keyword{
  display:inline-block;
  background:#222;
  padding:5px 10px;
  border-radius:20px;
  margin:5px 5px 0 0;
}
</style>
</head>

<body>

<header>
  <h1>BrainBoost Pro</h1>
  <p>Smart Study Engine — Built by Vrishab Varun</p>
</header>

<div class="container">

  <div class="search-box">
    <input id="topicInput" placeholder="Search anything...">
    <button onclick="searchTopic()">Search</button>
    <button onclick="randomTopic()">Random</button>
  </div>

  <div id="results" class="card hidden">
    <h2 id="title"></h2>
    <div id="image"></div>

    <div class="section-title">Summary</div>
    <div id="overview"></div>

    <div class="section-title">Key Concepts</div>
    <div id="keywords"></div>

    <div class="section-title">Study Notes</div>
    <ul id="notes"></ul>

    <div class="section-title">Interactive Quiz (Click to Reveal Answer)</div>
    <div id="quiz"></div>
  </div>

</div>

<script>

document.getElementById("topicInput").addEventListener("keydown", function(e){
  if(e.key==="Enter"){ searchTopic(); }
});

let fullText="";

async function searchTopic(topicOverride=null){

  const inputField=document.getElementById("topicInput");
  const input=topicOverride || inputField.value.trim();
  if(!input) return;

  document.getElementById("results").classList.remove("hidden");
  document.getElementById("title").innerText="Searching...";
  document.getElementById("overview").innerText="";
  document.getElementById("image").innerHTML="";
  document.getElementById("notes").innerHTML="";
  document.getElementById("quiz").innerHTML="";
  document.getElementById("keywords").innerHTML="";

  try{

    const searchRes=await fetch(
      `https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&list=search&srsearch=${encodeURIComponent(input)}&srlimit=1`
    );
    const searchData=await searchRes.json();

    if(!searchData.query.search.length){
      document.getElementById("title").innerText="No Results Found";
      return;
    }

    const bestMatch=searchData.query.search[0].title;

    const pageRes=await fetch(
      `https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&prop=extracts&explaintext=true&titles=${encodeURIComponent(bestMatch)}`
    );
    const pageData=await pageRes.json();
    const page=Object.values(pageData.query.pages)[0];
    fullText=page.extract;

    const summaryRes=await fetch(
      `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(bestMatch)}`
    );
    const summaryData=await summaryRes.json();

    document.getElementById("title").innerText=bestMatch;
    document.getElementById("overview").innerText=summaryData.extract;

    if(summaryData.thumbnail){
      document.getElementById("image").innerHTML=
        `<img src="${summaryData.thumbnail.source}" style="width:100%;border-radius:15px;margin:15px 0;">`;
    }

    generateKeywords(fullText);
    generateNotes(fullText);
    generateQuiz(fullText);

  }catch(error){
    document.getElementById("title").innerText="Connection Error";
  }
}

function generateKeywords(text){
  const words=text.split(/\s+/);
  const freq={};

  words.forEach(word=>{
    word=word.toLowerCase().replace(/[^a-z]/g,"");
    if(word.length>6){
      freq[word]=(freq[word]||0)+1;
    }
  });

  const sorted=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,8);

  sorted.forEach(item=>{
    const span=document.createElement("span");
    span.className="keyword";
    span.innerText=item[0];
    document.getElementById("keywords").appendChild(span);
  });
}

function generateNotes(text){
  const sentences=text.split(". ").slice(0,6);
  sentences.forEach(sentence=>{
    const li=document.createElement("li");
    li.innerText=sentence.trim()+".";
    document.getElementById("notes").appendChild(li);
  });
}

function generateQuiz(text){
  const sentences=text.split(". ").slice(0,5);

  sentences.forEach(sentence=>{
    const container=document.createElement("div");
    container.className="quiz-question";

    const question=document.createElement("div");
    question.innerText="What is described by: "+sentence.substring(0,60)+"?";

    const answer=document.createElement("div");
    answer.className="answer";
    answer.innerText=sentence.trim()+".";

    question.onclick=function(){
      answer.style.display = answer.style.display==="none"?"block":"none";
    };

    container.appendChild(question);
    container.appendChild(answer);
    document.getElementById("quiz").appendChild(container);
  });
}

function randomTopic(){
  fetch("https://en.wikipedia.org/api/rest_v1/page/random/summary")
    .then(res=>res.json())
    .then(data=>searchTopic(data.title));
}

</script>

</body>
</html>
